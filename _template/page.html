<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- TITLE --> — Mainen Lab</title>
<meta name="description" content="<!-- DESCRIPTION -->">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
/* === Reset === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === Palette (light) === */
:root {
  --bg: #fafaf8;
  --bg-card: #ffffff;
  --text: #1a1a1a;
  --muted: #6b7280;
  --border: #e5e7eb;
  --hover: #f3f4f6;
  --accent: #0d9488;
  --highlight: #f0fdfa;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}

/* === Palette (dark) === */
[data-theme="dark"] {
  --bg: #111111;
  --bg-card: #1a1a1a;
  --text: #e5e5e5;
  --muted: #9ca3af;
  --border: #2d2d2d;
  --hover: #222222;
  --accent: #2dd4bf;
  --highlight: #0d2926;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}

/* === Base === */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.2s, color 0.2s;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* === Typography === */
h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 0.2rem;
}
h2 {
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 0.4rem;
}
h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
p { margin-bottom: 0.8em; }
.subtitle { color: var(--muted); font-size: 0.95rem; margin-top: 0.2rem; }
.page-meta { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.5rem; }
.section-title {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin: 1.5rem 0 0.5rem;
}

/* === Layout === */
.container { max-width: 920px; margin: 0 auto; padding: 0 1.25rem; }
.page { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }
.page-wide { max-width: 920px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }

/* === Header === */
header {
  padding: 2.5rem 0 1.5rem;
  border-bottom: 1px solid var(--border);
  position: relative;
}
header h1 { font-size: 1.6rem; }
header .subtitle { margin-top: 0.2rem; }

/* === Theme toggle === */
#theme-toggle {
  position: absolute;
  top: 2.5rem;
  right: 0;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.4rem 0.6rem;
  cursor: pointer;
  color: var(--text);
  font-size: 0.85rem;
}
#theme-toggle:hover { background: var(--hover); }

/* === Back link === */
.back {
  font-size: 0.85rem;
  color: var(--accent);
  text-decoration: none;
  display: inline-block;
  margin-bottom: 1.5rem;
}
.back:hover { text-decoration: underline; }

/* === Cards === */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 0.6rem;
  box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.card-title { font-weight: 600; font-size: 0.95rem; }
.card-body { font-size: 0.85rem; line-height: 1.6; color: var(--muted); }
.card-meta { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.3rem; }
.card-span { font-size: 0.78rem; color: var(--muted); }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.6rem;
}

/* === Pills === */
.pill {
  display: inline-block;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  font-size: 0.78rem;
  border: 1px solid var(--border);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  white-space: nowrap;
}
.pill:hover { background: var(--hover); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* === Status badges === */
.status {
  font-size: 0.65rem;
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #fff;
}
.status.active { background: #16a34a; }
.status.completed { background: #9ca3af; }
.status.dormant { background: #eab308; }

/* === Callout === */
.callout {
  padding: 1rem 1.25rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
  margin-bottom: 0.75rem;
}
.callout p { font-size: 0.88rem; color: var(--muted); line-height: 1.65; margin-bottom: 0; }

/* === Publication list === */
.pub-list { list-style: none; padding: 0; }
.pub-list li {
  font-size: 0.88rem;
  color: var(--text);
  margin-bottom: 0.6rem;
  line-height: 1.55;
}
.pub-list li .journal { color: var(--muted); }
.pub-list li a { color: var(--accent); text-decoration: none; }
.pub-list li a:hover { text-decoration: underline; }

/* === Links row === */
.links { margin-top: 1.5rem; font-size: 0.85rem; }
.links a { color: var(--accent); text-decoration: none; margin-right: 1.2rem; }
.links a:hover { text-decoration: underline; }

/* === Search === */
.search-box {
  width: 100%;
  padding: 0.5rem 0.75rem;
  font-size: 0.88rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  margin-bottom: 0.75rem;
}
.search-box:focus { border-color: var(--accent); }

/* === Footer === */
footer {
  padding: 2rem 0;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--muted);
  font-size: 0.8rem;
}
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }
footer .sep { margin: 0 0.5rem; opacity: 0.4; }

/* === Responsive === */
@media (max-width: 640px) {
  header h1 { font-size: 1.3rem; }
  .page, .page-wide { padding: 1.5rem 1rem 2.5rem; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">

<header>
  <h1><!-- HEADER --></h1>
  <div class="subtitle"><!-- SUBTITLE --></div>
  <button id="theme-toggle" aria-label="Toggle dark mode">&#9790;</button>
</header>

<!-- CONTENT -->

<footer>
  <div class="container">
    <a href="https://mainenlab.org">mainenlab.org</a>
    <span class="sep">&middot;</span>
    <!-- FOOTER -->
  </div>
</footer>

</div>

<script>
const toggle = document.getElementById('theme-toggle');
toggle.addEventListener('click', () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
});
if (localStorage.getItem('theme') === 'dark') document.documentElement.dataset.theme = 'dark';
</script>

</body>
</html>
